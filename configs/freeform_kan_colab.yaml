# Free-form KAN discovery — Colab training config.
#
# Study: can a generic multi-layer KAN discover τ(T,ε) = T:ε from data with
# NO polarization-identity scaffold and NO hint that the target is bilinear?
#
# Training mode: standalone pointwise regression (NOT embedded LS-FNO).
#   Input:  (T_voxel, ε_voxel) pairs extracted from dataset_v3.h5
#   Target: ξ_true = T:ε  (computed in closed form from the inputs)
#   Loss:   relative L2  ‖ξ_pred − ξ_true‖ / ‖ξ_true‖
#
# This is ~50× cheaper than embedded training (no K=140 unrolled iterations).
# Estimated wall-clock: 5–10 min on T4 GPU for 5,000 Adam steps.
#
# Checkpoint save/resume:
#   Training is fast enough that a session restart is unlikely to matter, but
#   checkpoints are written to Drive every `save_every` steps so that partial
#   results are never lost.

experiment: experiment.yaml    # physics constants (kappa, alpha0, N, dim, …)

# ── Data ───────────────────────────────────────────────────────────────────────
# T is computed from C_field inside the notebook; ε is sampled randomly and
# independently of T (NOT eps_star from the dataset — see §6 prep_batch).
# ξ_true = T:ε is computed in closed form.  This forces the model to learn
# the true bilinear law rather than exploiting (T, ε★) correlation shortcuts.
train_path: /content/drive/MyDrive/ls_kan_fno/data/dataset_v3.h5
val_path:   /content/drive/MyDrive/ls_kan_fno/data/dataset_v3.h5

# Samples per gradient step.  Each sample contributes N×N=64×64=4096 voxels,
# so effective batch of pixel-level data = batch_size × 4096.
# batch_size=8 → 32,768 data points/step — large enough, cheap enough.
batch_size:  16
num_workers: 1

# ── Model (FreeFormKANTauTheta) ────────────────────────────────────────────────
# Architecture: [input_dim] + width + [output_dim]
# For n_comp=3 (2D): input_dim=9 (6 upper-tri T + 3 ε), output_dim=3.
#   depth-1  width=[18] → dims=[9,18,3]   → 1,944 params  ← theoretical minimum
#   depth-2  width=[18,12] → dims=[9,18,12,3] → 3,672 params
# Theoretical minimum hidden width: 18 (= 9 unique products × 2 neurons each).
width: [18, 9]      # hidden layer widths (list); try [18,12] for depth-2
grid_size: 5     # B-spline grid intervals G; increase to 10 or 20 after Adam
k: 3             # spline degree (cubic)
x_range: [-2.0, 2.0]   # B-spline domain; covers T∈[-0.93,0.93] and scaled ε∈[-1.3,1.3]

# Scale ε features before the KAN so they match the magnitude of T (≈0.9).
# With eps_bar_scale=0.01 and T_max≈0.92, eps_input_scale=100 brings both to [-1,1].
# This is a fixed normalisation — not a structural prior.
eps_input_scale: 100.0

# Range for randomly sampled ε during training.
# ε is drawn uniformly from [-eps_scale, eps_scale] per voxel per component,
# independently of T.  After eps_input_scale multiplication the KAN sees values
# in [-eps_scale*100, eps_scale*100] — keep this within x_range=[-2,2].
# eps_scale=0.02 → KAN input range [-2, 2], covering the full spline domain.
eps_scale: 0.02

# ── Physics constraints (from linear elasticity theory) ──────────────────────
# These regularizers inject physical knowledge without assuming the functional
# form of τ.  Each is derivable from "the material is linearly elastic" alone.
#
# The training loop samples two independent half-scale strains per step:
#   ε₁, ε₂ ~ Uniform[-eps_scale/2, eps_scale/2]  (sum stays within x_range)
# This yields 4 forward passes per step: τ₁, τ₂, τ(ε₁+ε₂), τ(0).
#
# Superposition  (lambda_sup):  τ(T, ε₁+ε₂) = τ(T,ε₁) + τ(T,ε₂)
#   Source: governing PDEs of linear elasticity are linear in ε for any C(x),
#           including heterogeneous composites with inclusions.
#   Effect: forces τ to be linear in ε — without specifying which linear form.
#
# Reciprocity  (lambda_rec):    ε₁·τ(T,ε₂) = ε₂·τ(T,ε₁)
#   Source: major symmetry of C (C_{ijkl} = C_{klij}), which carries through
#           to T = (C − α₀I)/α₀.
#   Effect: forces the linear operator in ε to be symmetric.
#
# Zero at zero  (lambda_zero):  τ(T, 0) = 0
#   Source: no prestress in linear elasticity; σ = C:ε = 0 when ε = 0.
#   Effect: anchors the linear function through the origin.
#
# Together: narrow the search to "symmetric linear-in-ε vanishing at zero"
# without assuming T:ε.  The KAN discovers the specific form from data.
# Post-training: test T-linearity (superposition in T) to confirm bilinearity,
# then read the Hessian pattern to identify the specific form T:ε.
#
# Set to 0.0 to disable individual constraints.
lambda_sup:  1.0    # superposition in ε loss weight
lambda_rec:  1.0    # reciprocity (major C-symmetry) loss weight
lambda_zero: 0.1    # zero-at-zero loss weight
#
# ε-constraints alone are INSUFFICIENT for bilinearity.  They force τ linear
# in ε, but the model can still learn τ(T,ε) = f(T)·ε with nonlinear f(T).
# The mixed Hessian ∂²τ/∂T∂ε then varies across voxels → bilinearity fails.
#
# T-linearity constraints: derived from "τ = (C−α₀I):ε is linear in C, hence
# in T = (C−α₀I)/α₀."  Combined with ε-linearity → bilinear τ(T,ε) = M:T:ε.
# Task loss then identifies M=I (i.e., τ=T:ε) from data.
#
# T-midpoint  (lambda_sup_T):  τ((T₁+T₂)/2, ε) = (τ(T₁,ε)+τ(T₂,ε))/2
#   Splits each batch in half: T₁ (first half) and T₂ (second half).
#   Midpoint (T₁+T₂)/2 stays in the original T-range → no extrapolation.
#
# T-zero  (lambda_zero_T):  τ(0, ε) = 0
#   T=0 means C=α₀I (reference stiffness) → zero polarized stress.
#   Prevents learning a T-independent g(ε) that ignores T entirely.
lambda_sup_T:  1.0   # T-midpoint (linearity in T) loss weight
lambda_zero_T: 0.5   # T-zero loss weight

# ── Gradient clipping ─────────────────────────────────────────────────────────
# 7 forward passes per step (4 ε-passes + 3 T-passes at half batch-size).
# Clipping at 1.0 prevents spikes from high-variance gradient estimates.
grad_clip: 1.0

# ── Sparsity regularization ───────────────────────────────────────────────────
# L1 penalty on edge function magnitudes: L = L_task + λ × Σ_edges mean|φ(x)|
# Setting λ=0 disables the penalty entirely (pure relative-L2 loss).
# With 9 inputs and width=[18], only 36/162 L1 edges should be active (22%).
# The L1 penalty pushes the other 126 toward zero, making the active edges
# easier to find.  Suggested starting range: 1e-4 to 1e-3.
# Too large (> 0.01) → all edges collapse to zero.
sparsity_lambda: 0

# ── Optimizer / schedule (Adam phase) ─────────────────────────────────────────
n_steps:     30000    # Adam gradient steps (not epochs — data is sampled per step)
lr:           1.0e-3
lr_min:       1.0e-5   # CosineAnnealingLR min LR
weight_decay: 0.0

# ── LBFGS refinement phase ────────────────────────────────────────────────────
# Runs after Adam on a fixed batch.  Sharpens the B-spline coefficients.
# Usually takes < 30 seconds.
lbfgs_steps:      200
lbfgs_batch_size: 4     # whole samples (4 × 4096 = 16,384 voxels for LBFGS)

# ── Output / logging ──────────────────────────────────────────────────────────
output_dir: /content/drive/MyDrive/ls_kan_fno/runs/freeform_kan
save_every:  500       # save checkpoint every N Adam steps
log_every:   100       # print loss every N steps
val_every:   500       # evaluate on val split every N steps

seed: 42
