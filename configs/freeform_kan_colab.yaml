# Free-form KAN discovery — Colab training config.
#
# Study: can a generic multi-layer KAN discover τ(T,ε) = T:ε from data with
# NO polarization-identity scaffold and NO hint that the target is bilinear?
#
# Training mode: standalone pointwise regression (NOT embedded LS-FNO).
#   Input:  (T_voxel, ε_voxel) pairs extracted from dataset_v3.h5
#   Target: ξ_true = T:ε  (computed in closed form from the inputs)
#   Loss:   relative L2  ‖ξ_pred − ξ_true‖ / ‖ξ_true‖
#
# This is ~50× cheaper than embedded training (no K=140 unrolled iterations).
# Estimated wall-clock: 5–10 min on T4 GPU for 5,000 Adam steps.
#
# Checkpoint save/resume:
#   Training is fast enough that a session restart is unlikely to matter, but
#   checkpoints are written to Drive every `save_every` steps so that partial
#   results are never lost.

experiment: experiment.yaml    # physics constants (kappa, alpha0, N, dim, …)

# ── Data ───────────────────────────────────────────────────────────────────────
# Same dataset as Study 2.  T is computed from C_field inside the notebook;
# eps_star is used as ε; ξ_true = T:ε_star is computed on the fly.
train_path: /content/drive/MyDrive/ls_kan_fno/data/dataset_v3.h5
val_path:   /content/drive/MyDrive/ls_kan_fno/data/dataset_v3.h5

# Samples per gradient step.  Each sample contributes N×N=64×64=4096 voxels,
# so effective batch of pixel-level data = batch_size × 4096.
# batch_size=8 → 32,768 data points/step — large enough, cheap enough.
batch_size:  16
num_workers: 1

# ── Model (FreeFormKANTauTheta) ────────────────────────────────────────────────
# Architecture: [input_dim] + width + [output_dim]
# For n_comp=3 (2D): input_dim=9 (6 upper-tri T + 3 ε), output_dim=3.
#   depth-1  width=[18] → dims=[9,18,3]   → 1,944 params  ← theoretical minimum
#   depth-2  width=[18,12] → dims=[9,18,12,3] → 3,672 params
# Theoretical minimum hidden width: 18 (= 9 unique products × 2 neurons each).
width: [18, 9]      # hidden layer widths (list); try [18,12] for depth-2
grid_size: 5     # B-spline grid intervals G; increase to 10 or 20 after Adam
k: 3             # spline degree (cubic)
x_range: [-2.0, 2.0]   # B-spline domain; covers T∈[-0.93,0.93] and scaled ε∈[-1.3,1.3]

# Scale ε features before the KAN so they match the magnitude of T (≈0.9).
# With eps_bar_scale=0.01 and T_max≈0.92, eps_input_scale=100 brings both to [-1,1].
# This is a fixed normalisation — not a structural prior.
eps_input_scale: 100.0

# ── Sparsity regularization ───────────────────────────────────────────────────
# L1 penalty on edge function magnitudes: L = L_task + λ × Σ_edges mean|φ(x)|
# Setting λ=0 disables the penalty entirely (pure relative-L2 loss).
# With 9 inputs and width=[18], only 36/162 L1 edges should be active (22%).
# The L1 penalty pushes the other 126 toward zero, making the active edges
# easier to find.  Suggested starting range: 1e-4 to 1e-3.
# Too large (> 0.01) → all edges collapse to zero.
sparsity_lambda: 0

# ── Optimizer / schedule (Adam phase) ─────────────────────────────────────────
n_steps:     5000    # Adam gradient steps (not epochs — data is sampled per step)
lr:           1.0e-3
lr_min:       1.0e-5   # CosineAnnealingLR min LR
weight_decay: 0.0

# ── LBFGS refinement phase ────────────────────────────────────────────────────
# Runs after Adam on a fixed batch.  Sharpens the B-spline coefficients.
# Usually takes < 30 seconds.
lbfgs_steps:      200
lbfgs_batch_size: 4     # whole samples (4 × 4096 = 16,384 voxels for LBFGS)

# ── Output / logging ──────────────────────────────────────────────────────────
output_dir: /content/drive/MyDrive/ls_kan_fno/runs/freeform_kan
save_every:  500       # save checkpoint every N Adam steps
log_every:   100       # print loss every N steps
val_every:   500       # evaluate on val split every N steps

seed: 42
